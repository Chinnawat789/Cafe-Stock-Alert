<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>บวกวันด่วน - Cafe Stock</title>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1c1917">

        <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDbnM6XVkAIj1a1cSuo2qgAJLb4euVLsWg",
          authDomain: "cafe-stock-alert.firebaseapp.com",
          projectId: "cafe-stock-alert",
          storageBucket: "cafe-stock-alert.firebasestorage.app",
          messagingSenderId: "320377962389",
          appId: "1:320377962389:web:e71edf9bc87df8028ec09c",
          measurementId: "G-S9EK0THP2J"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

</head>
<body class="h-screen flex flex-col overflow-hidden text-stone-800 bg-stone-50">
    <div id="toastMsg" class="fixed top-16 left-1/2 -translate-x-1/2 bg-stone-800 text-white px-5 py-3 rounded-2xl shadow-2xl z-[200] transition-all duration-500 opacity-0 pointer-events-none flex items-center gap-3 transform -translate-y-10 w-[90%] max-w-sm text-sm font-medium">
        <i data-lucide="bell" id="toastIcon" class="w-6 h-6 text-amber-400 shrink-0"></i>
        <div class="flex flex-col">
            <span id="toastTitle" class="font-bold text-[10px] text-stone-300 uppercase tracking-wider mb-0.5 hidden">การแจ้งเตือน</span>
            <span id="toastText" class="leading-tight">ข้อความ</span>
        </div>
    </div>

    <!-- Header -->
    <div class="bg-white px-4 py-4 shadow-sm z-10 flex items-center shrink-0 border-b border-amber-500 border-b-4">
        <a href="index.html" class="p-2 -ml-2 mr-2 text-stone-500 hover:bg-stone-100 rounded-full transition"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
        <h1 class="text-lg font-bold text-stone-800 flex items-center gap-2">
            <i data-lucide="clock" class="text-amber-500 w-5 h-5"></i>
            บวกวันด่วน
        </h1>
    </div>

    <!-- Container -->
    <div class="flex-1 overflow-y-auto p-4 flex flex-col items-center">
        <div class="w-full max-w-lg bg-white rounded-3xl p-6 shadow-sm border border-stone-100 mt-2">
            <label class="text-xs text-stone-500 font-bold">ชื่อวัตถุดิบ / สินค้า</label>
            <input type="text" id="q_itemName" list="cafeItems" placeholder="เช่น นมสดเมจิ (เปิดแล้ว), วิปครีม" class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-3 text-sm mb-4 focus:ring-2 focus:ring-amber-500 outline-none">
            
            <label class="text-xs text-stone-500 font-bold">หมวดหมู่</label>
            <select id="q_itemCategory" class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-3 text-sm mb-6 focus:ring-2 focus:ring-amber-500 outline-none">
                <option value="นม/ของเหลว">นม/ของเหลว</option>
                <option value="กาแฟ/ชา">กาแฟ/ชา</option>
                <option value="ไซรัป">ไซรัป</option>
                <option value="เบเกอรี่">เบเกอรี่</option>
                <option value="อื่นๆ" selected>อื่นๆ</option>
            </select>
            <datalist id="q_suggestions">
                <option value="นมสดพาสเจอร์ไรซ์">
                <option value="เมล็ดกาแฟคั่วกลาง">
                <option value="ไซรัปวนิลา">
                <option value="ไซรัปคาราเมล">
                <option value="เบเกอรี่/ครัวซองต์">
            </datalist>
            
            <div class="flex flex-col gap-3 mb-6">
                <div class="flex items-center gap-2">
                    <input type="date" id="q_itemProdDate" class="flex-1 bg-stone-50 border border-stone-200 rounded-xl px-3 py-2 outline-none focus:border-amber-500 font-medium text-stone-800 text-[10px]" title="วันผลิต (ถ้ามี)">
                    <label class="flex items-center gap-1.5 cursor-pointer bg-stone-50 border border-stone-200 rounded-xl px-3 py-2 shrink-0">
                        <input type="checkbox" id="q_isOpened" class="w-3.5 h-3.5 accent-amber-500">
                        <span class="text-[10px] text-stone-600 font-bold whitespace-nowrap">เปิดใช้ทันที</span>
                    </label>
                </div>
                <div class="flex items-center gap-2">
                    <label class="text-[10px] text-stone-500 font-bold whitespace-nowrap">แจ้งเตือนถ้าเหลือต่ำกว่า:</label>
                    <input type="number" id="q_minQty" value="0" min="0" class="flex-1 bg-stone-50 border border-stone-200 rounded-xl px-3 py-1.5 outline-none focus:border-amber-500 font-bold text-stone-800 text-xs text-center w-20">
                    <span class="text-[10px] text-stone-400 font-medium">ชิ้น</span>
                </div>
            </div>

            <p class="text-xs text-stone-500 font-bold mb-3 flex items-center gap-1"><i data-lucide="plus-circle" class="w-3 h-3"></i> กดเลือกอายุการเก็บรักษา (นับจากตอนนี้)</p>
            <div class="grid grid-cols-3 gap-3 mb-2">
                <button onclick="App.saveQuickAdd(1)" class="quick-btn"><span class="text-2xl font-black block mb-1">1</span><span class="text-[10px] font-medium leading-tight text-center">วัน<br>(พรุ่งนี้)</span></button>
                <button onclick="App.saveQuickAdd(3)" class="quick-btn"><span class="text-2xl font-black block mb-1">3</span><span class="text-[10px] font-medium leading-tight text-center">วัน</span></button>
                <button onclick="App.saveQuickAdd(7)" class="quick-btn"><span class="text-2xl font-black block mb-1">7</span><span class="text-[10px] font-medium leading-tight text-center">วัน<br>(1 สัปดาห์)</span></button>
                <button onclick="App.saveQuickAdd(14)" class="quick-btn"><span class="text-2xl font-black block mb-1">14</span><span class="text-[10px] font-medium leading-tight text-center">วัน<br>(2 สัปดาห์)</span></button>
                <button onclick="App.saveQuickAdd(30)" class="quick-btn"><span class="text-2xl font-black block mb-1">30</span><span class="text-[10px] font-medium leading-tight text-center">วัน<br>(1 เดือน)</span></button>
                <button onclick="App.saveQuickAdd(90)" class="quick-btn" style="border-color:#e7e5e4;background-color:#fafaf9;color:#57534e;"><span class="text-2xl font-black block mb-1">3</span><span class="text-[10px] font-medium leading-tight text-center">เดือน<br>(ไซรัป)</span></button>
            </div>
        </div>
    </div>

    <script src="./app.js?v=999"></script>
</body>
</html>
