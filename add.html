<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เพิ่มรายการใหม่ - Cafe Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1c1917">

        <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDbnM6XVkAIj1a1cSuo2qgAJLb4euVLsWg",
          authDomain: "cafe-stock-alert.firebaseapp.com",
          projectId: "cafe-stock-alert",
          storageBucket: "cafe-stock-alert.firebasestorage.app",
          messagingSenderId: "320377962389",
          appId: "1:320377962389:web:e71edf9bc87df8028ec09c",
          measurementId: "G-S9EK0THP2J"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
</head>
<body class="h-screen flex flex-col overflow-hidden text-stone-800 bg-stone-50">
    <div id="toastMsg" class="fixed top-16 left-1/2 -translate-x-1/2 bg-stone-800 text-white px-5 py-3 rounded-2xl shadow-2xl z-[200] transition-all duration-500 opacity-0 pointer-events-none flex items-center gap-3 transform -translate-y-10 w-[90%] max-w-sm text-sm font-medium">
        <i data-lucide="bell" id="toastIcon" class="w-6 h-6 text-amber-400 shrink-0"></i>
        <div class="flex flex-col">
            <span id="toastTitle" class="font-bold text-[10px] text-stone-300 uppercase tracking-wider mb-0.5 hidden">การแจ้งเตือน</span>
            <span id="toastText" class="leading-tight">ข้อความ</span>
        </div>
    </div>

    <!-- Camera Overlay -->
    <div id="cameraOverlay" class="fixed inset-0 bg-stone-950 z-[150] hidden flex flex-col">
        <div class="p-4 flex justify-between items-center text-white bg-black/50 absolute top-0 left-0 right-0 z-10">
            <h2 class="font-bold flex items-center gap-2"><i data-lucide="camera" class="w-5 h-5 text-amber-400"></i> สแกนฉลากสินค้า</h2>
            <button type="button" onclick="App.closeCamera()" class="p-2 bg-stone-800 rounded-full hover:bg-stone-700 transition"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="flex-1 relative bg-black overflow-hidden flex items-center justify-center">
            <video id="cameraVideo" autoplay playsinline class="w-full h-full object-contain"></video>
            <!-- Guide overlay -->
            <div class="absolute inset-0 border-[40px] border-black/50 pointer-events-none flex items-center justify-center">
                <div class="w-full h-full border-2 border-amber-400/80 border-dashed rounded-xl flex items-center justify-center relative shadow-[0_0_0_9999px_rgba(0,0,0,0.5)]">
                    <span class="text-white text-xs bg-black/60 px-4 py-1.5 rounded-full absolute -bottom-10 shadow-md backdrop-blur-sm">จัดฉลากหรือวันที่ให้อยู่ในกรอบ</span>
                </div>
            </div>
        </div>
        <div class="p-6 bg-black flex justify-center items-center pb-10 shadow-[0_-10px_30px_rgba(0,0,0,0.8)] z-10 relative">
            <button type="button" onclick="App.capturePhoto()" class="w-20 h-20 bg-white rounded-full border-4 border-stone-300 flex items-center justify-center active:scale-95 transition-transform shadow-[0_0_20px_rgba(255,255,255,0.2)]">
                <div class="w-[60px] h-[60px] bg-white rounded-full border border-stone-200 shadow-inner"></div>
            </button>
        </div>
        <canvas id="cameraCanvas" class="hidden"></canvas>
    </div>

    <!-- หน้าจอโหลด AI -->
    <div id="loadingOverlay" class="fixed inset-0 bg-stone-900/90 z-[100] hidden flex-col items-center justify-center text-white backdrop-blur-sm">
        <div class="relative w-20 h-20 mb-6">
            <i data-lucide="scan-face" class="w-20 h-20 animate-pulse text-amber-500 absolute inset-0 opacity-50"></i>
            <div class="absolute inset-0 border-4 border-t-amber-400 border-r-transparent border-b-transparent border-l-transparent rounded-full animate-spin"></div>
        </div>
        <h3 class="font-bold text-xl mb-1">Gemini AI OCR</h3>
        <p class="text-sm text-stone-300 text-center px-6" id="ocrProgress">กำลังดึงข้อมูล วันหมดอายุ และ ชื่อสินค้า<br>จากรูปภาพของคุณ...</p>
    </div>

    <!-- Header -->
    <div class="bg-white px-4 py-4 shadow-sm z-10 flex items-center shrink-0 border-b border-amber-500 border-b-4">
        <a href="index.html" class="p-2 -ml-2 mr-2 text-stone-500 hover:bg-stone-100 rounded-full transition"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
        <h1 class="text-lg font-bold text-stone-800 flex items-center gap-2">
            <i data-lucide="calendar-check" class="text-amber-500 w-5 h-5"></i>
            เพิ่มรายการใหม่
        </h1>
    </div>

    <!-- Form Container -->
    <div class="flex-1 overflow-y-auto p-4 flex flex-col items-center">
        <div class="w-full max-w-lg bg-white rounded-3xl p-6 shadow-sm border border-stone-100 mt-2">
            <form id="addForm" onsubmit="App.handleNormalAdd(event)" class="space-y-5">
                <div>
                    <label class="text-xs text-stone-500 font-bold">ชื่อสินค้า / วัตถุดิบ</label>
                    <input type="text" id="n_itemName" required placeholder="ระบุชื่อวัตถุดิบ" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 mt-1 outline-none focus:border-amber-500 font-medium text-stone-800 transition">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-stone-500 font-bold">หมวดหมู่</label>
                        <select id="n_itemCategory" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 mt-1 outline-none focus:border-amber-500 font-medium text-stone-800 transition">
                            <option value="นม/ของเหลว">นม/ของเหลว</option>
                            <option value="กาแฟ/ชา">กาแฟ/ชา</option>
                            <option value="ไซรัป">ไซรัป</option>
                            <option value="เบเกอรี่">เบเกอรี่</option>
                            <option value="อื่นๆ" selected>อื่นๆ</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-stone-500 font-bold">จำนวนสต๊อก</label>
                        <div class="flex items-center mt-1 bg-stone-50 border border-stone-200 rounded-xl overflow-hidden">
                            <button type="button" onclick="document.getElementById('n_itemQty').stepDown()" class="px-3 py-3 text-stone-500 hover:bg-stone-200 active:bg-stone-300 transition shrink-0"><i data-lucide="minus" class="w-4 h-4"></i></button>
                            <input type="number" id="n_itemQty" value="1" min="1" class="w-full text-center bg-transparent py-3 outline-none font-bold text-stone-800">
                            <button type="button" onclick="document.getElementById('n_itemQty').stepUp()" class="px-3 py-3 text-stone-500 hover:bg-stone-200 active:bg-stone-300 transition shrink-0"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="text-xs text-stone-500 font-bold flex items-center gap-1">
                        วันที่และเวลาหมดอายุ (EXP)
                    </label>
                    <input type="datetime-local" id="n_expiryDate" required class="w-full bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 mt-1 outline-none focus:border-amber-500 font-bold text-amber-700 transition">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-stone-500 font-bold flex items-center gap-1">ราคาซื้อ (ต่อหน่วย)</label>
                        <input type="number" id="n_itemPrice" value="0" min="0" step="0.01" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 mt-1 outline-none focus:border-amber-500 font-bold text-emerald-600 transition text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] text-stone-500 font-bold flex items-center gap-1">แจ้งเตือนขั้นต่ำ</label>
                        <input type="number" id="n_minQty" value="0" min="0" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 mt-1 outline-none focus:border-amber-500 font-medium text-stone-800 transition text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="text-[10px] text-stone-500 font-bold flex items-center gap-1">วัน/เวลา ผลิต (ถ้ามี)</label>
                        <input type="date" id="n_itemProdDate" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 mt-1 outline-none focus:border-amber-500 font-medium text-stone-800 transition text-sm">
                    </div>
                </div>
                
                <div class="flex items-center justify-center mt-2 bg-stone-50 border border-stone-200 rounded-xl">
                    <label class="flex items-center gap-2 cursor-pointer w-full h-full px-4 py-3">
                        <input type="checkbox" id="n_isOpened" class="w-4 h-4 accent-amber-500 rounded cursor-pointer">
                        <span class="text-xs text-stone-600 font-bold">เปิดใช้งานทันที 1 ชิ้น</span>
                    </label>
                </div>
                
                <div class="pt-2 gap-3 flex flex-col">
                    <button type="submit" class="w-full bg-stone-800 text-white font-bold py-4 rounded-2xl hover:bg-stone-900 shadow-lg flex justify-center items-center gap-2 transition active:scale-95 mb-2">
                        <i data-lucide="save" class="w-5 h-5"></i> บันทึกเข้าระบบ
                    </button>
                    
                    <div class="relative flex items-center py-2">
                        <div class="flex-grow border-t border-stone-200"></div>
                        <span class="flex-shrink-0 mx-4 text-stone-400 text-xs font-medium">ความรวดเร็วระดับ AI</span>
                        <div class="flex-grow border-t border-stone-200"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" onclick="document.getElementById('receiptInput').click()" class="w-full bg-emerald-600 text-white font-bold py-3.5 rounded-xl hover:bg-emerald-700 shadow-md flex justify-center items-center gap-2 transition active:scale-95 text-xs">
                            <i data-lucide="file-text" class="w-4 h-4"></i> สแกนบิล/ใบเสร็จ
                        </button>
                        <input type="file" id="receiptInput" accept="image/*" class="hidden" onchange="App.handleReceiptScan(this)">

                        <button type="button" onclick="App.openCamera()" class="w-full bg-amber-500 text-white font-bold py-3.5 rounded-xl hover:bg-amber-600 shadow-md flex justify-center items-center gap-2 transition active:scale-95 text-xs">
                            <i data-lucide="camera" class="w-4 h-4"></i> สแกนฉลาก (ชิ้นเดียว)
                        </button>
                    </div>
                    
                    <button type="button" onclick="document.getElementById('ocrInput').click()" class="w-full mt-1 bg-stone-100 text-stone-600 font-bold py-3 rounded-xl hover:bg-stone-200 shadow-sm flex justify-center items-center gap-2 transition active:scale-95 text-xs">
                        <i data-lucide="image" class="w-4 h-4"></i> อัปโหลดจากแกลเลอรี
                    </button>
                    <input type="file" id="ocrInput" accept="image/*" class="hidden" onchange="App.handleGeminiScan(this)">
                </div>
            </form>
        </div>
    </div>

    <!-- Receipt Review Modal (New) -->
    <div id="receiptReviewModal" class="fixed inset-0 bg-stone-900/80 z-[180] hidden flex flex-col p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-lg mx-auto rounded-3xl overflow-hidden flex flex-col shadow-2xl mt-4 max-h-[90vh]">
            <div class="p-4 border-b flex justify-between items-center bg-stone-50">
                <h2 class="font-bold text-stone-800 flex items-center gap-2">
                    <i data-lucide="check-square" class="text-emerald-500"></i> ตรวจสอบรายการจากบิล
                </h2>
                <button type="button" onclick="document.getElementById('receiptReviewModal').classList.add('hidden')" class="p-1 hover:bg-stone-200 rounded-full transition"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-4" id="receiptReviewList">
                <!-- Items populated by JS -->
            </div>
            <div class="p-4 border-t bg-stone-50 flex gap-3">
                <button type="button" onclick="document.getElementById('receiptReviewModal').classList.add('hidden')" class="flex-1 py-3 text-stone-500 font-bold rounded-xl hover:bg-stone-100 transition">ยกเลิก</button>
                <button type="button" onclick="App.saveReceiptItems()" class="flex-1 bg-stone-800 text-white py-3 font-bold rounded-xl hover:bg-stone-900 shadow-md transition active:scale-95">บันทึกทั้งหมด</button>
            </div>
        </div>
    </div>

    <script src="./app.js?v=999"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
